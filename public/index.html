<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Store Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --surface3: #22222f;
    --border: #2a2a3a;
    --accent: #c9a96e;
    --accent2: #e8c99a;
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a72;
    --success: #4caf82;
    --warning: #e8a84c;
    --danger: #e05c5c;
    --info: #5c9ee0;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; overflow:hidden; }
  
  /* SIDEBAR */
  #sidebar {
    width:220px; min-width:220px; height:100vh; background:var(--surface);
    border-right:1px solid var(--border); display:flex; flex-direction:column;
    position:fixed; left:0; top:0; z-index:100; transition:all .3s;
  }
  .sidebar-logo {
    padding:20px 16px 16px; border-bottom:1px solid var(--border);
  }
  .sidebar-logo h1 { font-family:'Playfair Display',serif; font-size:18px; color:var(--accent); line-height:1.2; }
  .sidebar-logo span { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:3px; }
  
  .nav-section { padding:12px 0; }
  .nav-label { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:2px; padding:0 16px 6px; }
  .nav-item {
    display:flex; align-items:center; gap:10px; padding:9px 16px; cursor:pointer;
    font-size:13px; color:var(--text2); transition:all .15s; position:relative;
  }
  .nav-item:hover { color:var(--text); background:var(--surface2); }
  .nav-item.active { color:var(--accent); background:var(--surface2); }
  .nav-item.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent); border-radius:0 2px 2px 0; }
  .nav-icon { width:16px; text-align:center; font-size:14px; }

  /* MAIN */
  #main {
    margin-left:220px; flex:1; height:100vh; overflow-y:auto;
    background:var(--bg);
  }
  .topbar {
    position:sticky; top:0; z-index:50; background:rgba(10,10,15,0.95);
    backdrop-filter:blur(12px); border-bottom:1px solid var(--border);
    padding:14px 28px; display:flex; align-items:center; justify-content:space-between;
  }
  .topbar-title { font-family:'Playfair Display',serif; font-size:20px; }
  .topbar-actions { display:flex; gap:8px; }
  
  .content { padding:24px 28px; }
  
  /* STATS */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
  .stat-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px; position:relative; overflow:hidden;
  }
  .stat-card::after { content:''; position:absolute; top:0; right:0; width:60px; height:60px; background:var(--accent); opacity:.04; border-radius:0 0 0 60px; }
  .stat-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; }
  .stat-value { font-size:28px; font-weight:600; color:var(--text); }
  .stat-sub { font-size:11px; color:var(--text2); margin-top:4px; }
  .stat-icon { position:absolute; top:16px; right:16px; font-size:18px; opacity:.5; }

  /* CARD */
  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    margin-bottom:20px; overflow:hidden;
  }
  .card-header {
    padding:14px 18px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .card-title { font-size:13px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:8px; }
  .card-body { padding:0; }

  /* TABLE */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { padding:10px 14px; text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text3); border-bottom:1px solid var(--border); font-weight:500; background:var(--surface); white-space:nowrap; }
  td { padding:10px 14px; border-bottom:1px solid var(--border); color:var(--text2); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--surface2); }
  .td-main { color:var(--text); font-weight:500; }
  .td-mono { font-family:'DM Mono',monospace; font-size:12px; color:var(--info); }

  /* BADGES */
  .badge { display:inline-flex; align-items:center; padding:3px 8px; border-radius:100px; font-size:10px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; }
  .badge-success { background:rgba(76,175,130,.15); color:var(--success); }
  .badge-warning { background:rgba(232,168,76,.15); color:var(--warning); }
  .badge-danger { background:rgba(224,92,92,.15); color:var(--danger); }
  .badge-info { background:rgba(92,158,224,.15); color:var(--info); }
  .badge-default { background:var(--surface3); color:var(--text2); }

  /* BUTTONS */
  .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:6px; font-size:12px; font-weight:500; cursor:pointer; border:none; transition:all .15s; font-family:'DM Sans',sans-serif; }
  .btn-primary { background:var(--accent); color:#1a1200; }
  .btn-primary:hover { background:var(--accent2); }
  .btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border); }
  .btn-ghost:hover { background:var(--surface2); color:var(--text); }
  .btn-danger { background:rgba(224,92,92,.15); color:var(--danger); border:1px solid rgba(224,92,92,.2); }
  .btn-danger:hover { background:rgba(224,92,92,.25); }
  .btn-sm { padding:4px 10px; font-size:11px; }
  .btn-icon { padding:6px; }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200;
    display:flex; align-items:center; justify-content:center; padding:20px;
    opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    width:100%; max-width:560px; max-height:90vh; overflow-y:auto;
    transform:translateY(16px); transition:transform .2s;
    box-shadow:var(--shadow);
  }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-header { padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-title { font-family:'Playfair Display',serif; font-size:16px; }
  .modal-body { padding:20px; }
  .modal-footer { padding:14px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
  
  /* FORM */
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .form-full { grid-column:1/-1; }
  .form-group { display:flex; flex-direction:column; gap:5px; }
  .form-group label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; }
  .form-control {
    background:var(--surface2); border:1px solid var(--border); border-radius:6px;
    padding:8px 12px; font-size:13px; color:var(--text); font-family:'DM Sans',sans-serif;
    transition:border-color .15s; outline:none;
  }
  .form-control:focus { border-color:var(--accent); }
  .form-control::placeholder { color:var(--text3); }
  select.form-control option { background:var(--surface2); }
  textarea.form-control { resize:vertical; min-height:72px; }

  /* SEARCH BAR */
  .search-bar {
    display:flex; gap:8px; align-items:center; padding:12px 18px;
    border-bottom:1px solid var(--border); background:var(--surface);
  }
  .search-input {
    background:var(--surface2); border:1px solid var(--border); border-radius:6px;
    padding:7px 12px; font-size:12px; color:var(--text); font-family:'DM Sans',sans-serif;
    outline:none; min-width:200px;
  }
  .search-input:focus { border-color:var(--accent); }

  /* TOAST */
  #toast-container { position:fixed; bottom:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:8px; }
  .toast {
    background:var(--surface2); border:1px solid var(--border); border-radius:8px;
    padding:12px 16px; font-size:13px; color:var(--text); min-width:240px;
    display:flex; align-items:center; gap:10px; animation:slideIn .2s ease;
    box-shadow:var(--shadow);
  }
  .toast.success { border-color:var(--success); }
  .toast.error { border-color:var(--danger); }
  @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

  /* DASHBOARD */
  .chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .recent-list { padding:0; }
  .recent-item { display:flex; align-items:center; justify-content:space-between; padding:10px 18px; border-bottom:1px solid var(--border); }
  .recent-item:last-child { border-bottom:none; }

  /* EMPTY STATE */
  .empty { text-align:center; padding:48px 20px; color:var(--text3); }
  .empty-icon { font-size:32px; margin-bottom:12px; opacity:.4; }
  .empty p { font-size:13px; }

  /* LOADING */
  .loading { text-align:center; padding:32px; color:var(--text3); font-size:13px; }
  .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; margin-right:8px; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--text3); }

  /* PAGE */
  .page { display:none; }
  .page.active { display:block; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sidebar-logo">
    <h1>Fashion<br>Store</h1>
    <span>Management</span>
  </div>
  <div style="overflow-y:auto; flex:1;">
    <div class="nav-section">
      <div class="nav-label">Tổng quan</div>
      <div class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span> Dashboard</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Sản phẩm</div>
      <div class="nav-item" data-page="categories"><span class="nav-icon">🏷️</span> Danh mục</div>
      <div class="nav-item" data-page="products"><span class="nav-icon">👗</span> Sản phẩm</div>
      <div class="nav-item" data-page="variants"><span class="nav-icon">🎨</span> Biến thể SP</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Nhập hàng</div>
      <div class="nav-item" data-page="suppliers"><span class="nav-icon">🏭</span> Nhà cung cấp</div>
      <div class="nav-item" data-page="import-orders"><span class="nav-icon">📦</span> Đơn nhập hàng</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Người dùng</div>
      <div class="nav-item" data-page="customers"><span class="nav-icon">👥</span> Khách hàng</div>
      <div class="nav-item" data-page="staff"><span class="nav-icon">👤</span> Nhân viên</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Bán hàng</div>
      <div class="nav-item" data-page="orders"><span class="nav-icon">🛍️</span> Đơn hàng</div>
      <div class="nav-item" data-page="payments"><span class="nav-icon">💳</span> Thanh toán</div>
      <div class="nav-item" data-page="discounts"><span class="nav-icon">🎟️</span> Mã giảm giá</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Kho & Log</div>
      <div class="nav-item" data-page="returns"><span class="nav-icon">🔄</span> Trả hàng</div>
      <div class="nav-item" data-page="inventory"><span class="nav-icon">📋</span> Giao dịch kho</div>
      <div class="nav-item" data-page="audit"><span class="nav-icon">📝</span> Audit Log</div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Dashboard</div>
    <div class="topbar-actions" id="page-actions"></div>
  </div>
  <div class="content" id="page-content">
    <div class="loading"><span class="spinner"></span>Đang tải...</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-primary" id="modal-save">Lưu</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script>
const API = '';
let currentPage = 'dashboard';

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    const page = el.dataset.page;
    currentPage = page;
    loadPage(page);
  });
});

function loadPage(page) {
  const titles = {
    dashboard: 'Dashboard',
    categories: 'Danh mục sản phẩm',
    products: 'Sản phẩm',
    variants: 'Biến thể sản phẩm',
    suppliers: 'Nhà cung cấp',
    'import-orders': 'Đơn nhập hàng',
    customers: 'Khách hàng',
    staff: 'Nhân viên',
    orders: 'Đơn hàng',
    payments: 'Thanh toán',
    discounts: 'Mã giảm giá',
    returns: 'Trả hàng',
    inventory: 'Giao dịch kho',
    audit: 'Audit Log'
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  const pages = { dashboard: renderDashboard, categories: renderCategories, products: renderProducts, variants: renderVariants, suppliers: renderSuppliers, 'import-orders': renderImportOrders, customers: renderCustomers, staff: renderStaff, orders: renderOrders, payments: renderPayments, discounts: renderDiscounts, returns: renderReturns, inventory: renderInventory, audit: renderAudit };
  if (pages[page]) pages[page]();
}

// ─── API HELPERS ──────────────────────────────────────────────────────────────
async function apiFetch(path, opts={}) {
  try {
    const r = await fetch(API + path, { headers:{'Content-Type':'application/json'}, ...opts });
    return await r.json();
  } catch(e) { toast('Lỗi kết nối API', 'error'); return null; }
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✕':'ℹ'}</span> ${msg}`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(title, bodyHTML, saveCallback) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-save').onclick = saveCallback;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function setContent(html) { document.getElementById('page-content').innerHTML = html; }
function setActions(html) { document.getElementById('page-actions').innerHTML = html; }

function statusBadge(s) {
  if (!s) return '<span class="badge badge-default">—</span>';
  const m = { active:'success', inactive:'danger', pending:'warning', completed:'success', cancelled:'danger', processing:'info', paid:'success', unpaid:'warning', failed:'danger', approved:'success', rejected:'danger' };
  const cls = m[s?.toLowerCase()] || 'default';
  return `<span class="badge badge-${cls}">${s}</span>`;
}
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('vi-VN'); }
function fmtMoney(n) { if (!n && n!==0) return '—'; return Number(n).toLocaleString('vi-VN') + '₫'; }
function loading() { return '<div class="loading"><span class="spinner"></span>Đang tải...</div>'; }

function tableWrap(headers, rows, emptyMsg='Không có dữ liệu') {
  if (!rows || !rows.length) return `<div class="empty"><div class="empty-icon">📭</div><p>${emptyMsg}</p></div>`;
  return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.join('')}</tbody></table></div>`;
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
async function renderDashboard() {
  setActions('');
  setContent(loading());
  const d = await apiFetch('/api/dashboard/stats');
  if (!d) return;
  setContent(`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Tổng đơn hàng</div><div class="stat-value">${d.orders}</div><div class="stat-icon">🛍️</div></div>
      <div class="stat-card"><div class="stat-label">Doanh thu</div><div class="stat-value" style="font-size:20px">${fmtMoney(d.revenue)}</div><div class="stat-icon">💰</div></div>
      <div class="stat-card"><div class="stat-label">Khách hàng</div><div class="stat-value">${d.customers}</div><div class="stat-icon">👥</div></div>
      <div class="stat-card"><div class="stat-label">Sản phẩm</div><div class="stat-value">${d.products}</div><div class="stat-icon">👗</div></div>
      <div class="stat-card"><div class="stat-label">Sắp hết hàng</div><div class="stat-value" style="color:var(--warning)">${d.lowStock}</div><div class="stat-sub">< 10 sản phẩm</div><div class="stat-icon">⚠️</div></div>
    </div>
    <div class="chart-grid">
      <div class="card">
        <div class="card-header"><div class="card-title">🛍️ Đơn hàng gần đây</div></div>
        <div class="recent-list">
          ${d.recentOrders.length ? d.recentOrders.map(o=>`
            <div class="recent-item">
              <div>
                <div style="font-size:13px;color:var(--text)">#${o.order_id} · ${o.full_name}</div>
                <div style="font-size:11px;color:var(--text3)">${fmtDate(o.order_date)}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:13px;color:var(--accent)">${fmtMoney(o.total_amount)}</div>
                ${statusBadge(o.status)}
              </div>
            </div>`).join('') : '<div class="empty"><p>Chưa có đơn hàng</p></div>'}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">🏆 Top sản phẩm bán chạy</div></div>
        <div class="recent-list">
          ${d.topProducts.length ? d.topProducts.map((p,i)=>`
            <div class="recent-item">
              <div style="display:flex;align-items:center;gap:10px">
                <span style="font-size:11px;color:var(--accent);font-weight:600;min-width:16px">#${i+1}</span>
                <span style="font-size:13px">${p.name}</span>
              </div>
              <span style="font-size:13px;color:var(--text2)">${p.sold} đã bán</span>
            </div>`).join('') : '<div class="empty"><p>Chưa có dữ liệu</p></div>'}
        </div>
      </div>
    </div>
  `);
}

// ─── CATEGORIES ───────────────────────────────────────────────────────────────
async function renderCategories() {
  setActions(`<button class="btn btn-primary" onclick="openCategoryModal()">+ Thêm danh mục</button>`);
  setContent(loading());
  const rows = await apiFetch('/api/categories');
  if (!rows) return;
  setContent(`<div class="card"><div class="card-body">${
    tableWrap(['ID','Tên danh mục','Thao tác'], rows.map(r=>`
      <tr>
        <td class="td-mono">${r.category_id}</td>
        <td class="td-main">${r.category_name}</td>
        <td><div style="display:flex;gap:4px">
          <button class="btn btn-ghost btn-sm" onclick='openCategoryModal(${JSON.stringify(r)})'>Sửa</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRecord('/api/categories/${r.category_id}', renderCategories)">Xoá</button>
        </div></td>
      </tr>`))
  }</div></div>`);
}

function openCategoryModal(r=null) {
  openModal(r ? 'Sửa danh mục' : 'Thêm danh mục', `
    <div class="form-group">
      <label>Tên danh mục</label>
      <input class="form-control" id="f-cname" value="${r?.category_name||''}" placeholder="Nhập tên danh mục">
    </div>`, async () => {
    const val = document.getElementById('f-cname').value.trim();
    if (!val) return toast('Vui lòng nhập tên danh mục','error');
    const method = r ? 'PUT' : 'POST';
    const url = r ? `/api/categories/${r.category_id}` : '/api/categories';
    const res = await apiFetch(url, {method, body: JSON.stringify({category_name:val})});
    if (res) { toast('Lưu thành công'); closeModal(); renderCategories(); }
  });
}

// ─── PRODUCTS ─────────────────────────────────────────────────────────────────
async function renderProducts() {
  setActions(`<button class="btn btn-primary" onclick="openProductModal()">+ Thêm sản phẩm</button>`);
  setContent(loading());

      <div class="form-group"><label>Phương thức</label><select class="form-control" id="f-pmeth"><option value="cash" ${r?.payment_method==='cash'?'selected':''}>Tiền mặt</option><option value="card" ${r?.payment_method==='card'?'selected':''}>Thẻ</option><option value="transfer" ${r?.payment_method==='transfer'?'selected':''}>Chuyển khoản</option><option value="momo" ${r?.payment_method==='momo'?'selected':''}>MoMo</option></select></div>
      <div class="form-group"><label>Số tiền (₫)</label><input class="form-control" type="number" id="f-pamount" value="${r?.amount||''}"></div>
      <div class="form-group"><label>Trạng thái</label><select class="form-control" id="f-pstat"><option value="paid" ${r?.status==='paid'?'selected':''}>Paid</option><option value="unpaid" ${r?.status==='unpaid'?'selected':''}>Unpaid</option><option value="failed" ${r?.status==='failed'?'selected':''}>Failed</option></select></div>
    </div>`, async () => {
    const body = { order_id:document.getElementById('f-poid').value, payment_method:document.getElementById('f-pmeth').value, amount:document.getElementById('f-pamount').value, status:document.getElementById('f-pstat').value };
    if (!body.order_id) return toast('Chọn đơn hàng','error');
    const res = await apiFetch(r ? `/api/payments/${r.payment_id}` : '/api/payments', {method:r?'PUT':'POST', body:JSON.stringify(body)});
    if (res) { toast('Lưu thành công'); closeModal(); renderPayments(); }
  });
}

// ─── DISCOUNTS ────────────────────────────────────────────────────────────────
async function renderDiscounts() {
  setActions(`<button class="btn btn-primary" onclick="openDiscountModal()">+ Thêm mã giảm giá</button>`);
  setContent(loading());
  const rows = await apiFetch('/api/discounts');
  if (!rows) return;
  setContent(`<div class="card"><div class="card-body">${
    tableWrap(['ID','Mã','Loại','Giá trị','Hiệu lực','Kết thúc','Kích hoạt','Thao tác'], rows.map(r=>`
      <tr>
        <td class="td-mono">${r.discount_id}</td>
        <td class="td-mono" style="color:var(--accent)">${r.discount_code||'—'}</td>
        <td>${r.discount_type||'—'}</td>
        <td>${r.discount_type==='percent'?r.discount_value+'%':fmtMoney(r.discount_value)}</td>
        <td>${fmtDate(r.start_date)}</td>
        <td>${fmtDate(r.end_date)}</td>
        <td>${r.is_active?'<span class="badge badge-success">Active</span>':'<span class="badge badge-default">Off</span>'}</td>
        <td><div style="display:flex;gap:4px">
          <button class="btn btn-ghost btn-sm" onclick='openDiscountModal(${JSON.stringify(r)})'>Sửa</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRecord('/api/discounts/${r.discount_id}', renderDiscounts)">Xoá</button>
        </div></td>
      </tr>`))
  }</div></div>`);
}

function openDiscountModal(r=null) {
  openModal(r ? 'Sửa mã giảm giá' : 'Thêm mã giảm giá', `
    <div class="form-grid">
      <div class="form-group"><label>Mã giảm giá</label><input class="form-control" id="f-dcode" value="${r?.discount_code||''}"></div>
      <div class="form-group"><label>Loại</label><select class="form-control" id="f-dtype"><option value="percent" ${r?.discount_type==='percent'?'selected':''}>Phần trăm (%)</option><option value="fixed" ${r?.discount_type==='fixed'?'selected':''}>Cố định (₫)</option></select></div>
      <div class="form-group"><label>Giá trị</label><input class="form-control" type="number" id="f-dval" value="${r?.discount_value||''}"></div>
      <div class="form-group"><label>Kích hoạt</label><select class="form-control" id="f-dactive"><option value="1" ${r?.is_active?'selected':''}>Active</option><option value="0" ${!r?.is_active?'selected':''}>Inactive</option></select></div>
      <div class="form-group"><label>Ngày bắt đầu</label><input class="form-control" type="datetime-local" id="f-dstart" value="${r?.start_date?.slice(0,16)||''}"></div>
      <div class="form-group"><label>Ngày kết thúc</label><input class="form-control" type="datetime-local" id="f-dend" value="${r?.end_date?.slice(0,16)||''}"></div>
    </div>`, async () => {
    const body = { discount_code:document.getElementById('f-dcode').value, discount_type:document.getElementById('f-dtype').value, discount_value:document.getElementById('f-dval').value, is_active:document.getElementById('f-dactive').value, start_date:document.getElementById('f-dstart').value, end_date:document.getElementById('f-dend').value };
    if (!body.discount_code) return toast('Nhập mã giảm giá','error');
    const res = await apiFetch(r ? `/api/discounts/${r.discount_id}` : '/api/discounts', {method:r?'PUT':'POST', body:JSON.stringify(body)});
    if (res) { toast('Lưu thành công'); closeModal(); renderDiscounts(); }
  });
}

// ─── RETURNS ──────────────────────────────────────────────────────────────────
async function renderReturns() {
  setActions(`<button class="btn btn-primary" onclick="openReturnModal()">+ Tạo phiếu trả</button>`);
  setContent(loading());
  const [rows, orders, variants] = await Promise.all([apiFetch('/api/returns'), apiFetch('/api/orders'), apiFetch('/api/variants')]);
  window._variants = variants||[];
  if (!rows) return;
  setContent(`<div class="card"><div class="card-body">${
    tableWrap(['ID','Đơn hàng','Sản phẩm','SKU','SL','Lý do','Trạng thái','Ngày trả','Thao tác'], rows.map(r=>`
      <tr>
        <td class="td-mono">${r.return_id}</td>
        <td class="td-mono">#${r.order_id||'—'}</td>
        <td class="td-main">${r.product_name||'—'}</td>
        <td class="td-mono">${r.sku||'—'}</td>
        <td>${r.quantity||0}</td>
        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.reason||'—'}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${fmtDate(r.return_date)}</td>
        <td><div style="display:flex;gap:4px">
          <button class="btn btn-ghost btn-sm" onclick='openReturnModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>Sửa</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRecord('/api/returns/${r.return_id}', renderReturns)">Xoá</button>
        </div></td>
      </tr>`))
  }</div></div>`);
}

function openReturnModal(r=null) {
  const oOpts = (window._orders||[]).map(o=>`<option value="${o.order_id}" ${r?.order_id==o.order_id?'selected':''}>#${o.order_id}</option>`).join('');
  const vOpts = (window._variants||[]).map(v=>`<option value="${v.variant_id}" ${r?.variant_id==v.variant_id?'selected':''}>${v.sku} - ${v.product_name}</option>`).join('');
  openModal(r ? 'Sửa phiếu trả' : 'Tạo phiếu trả hàng', `
    <div class="form-grid">
      <div class="form-group"><label>Đơn hàng</label><select class="form-control" id="f-rorder"><option value="">-- Chọn --</option>${oOpts}</select></div>
      <div class="form-group"><label>Biến thể SP</label><select class="form-control" id="f-rvar"><option value="">-- Chọn --</option>${vOpts}</select></div>
      <div class="form-group"><label>Số lượng</label><input class="form-control" type="number" id="f-rqty" value="${r?.quantity||1}"></div>
      <div class="form-group"><label>Trạng thái</label><select class="form-control" id="f-rstat"><option value="pending" ${r?.status==='pending'?'selected':''}>Pending</option><option value="approved" ${r?.status==='approved'?'selected':''}>Approved</option><option value="rejected" ${r?.status==='rejected'?'selected':''}>Rejected</option></select></div>
      <div class="form-group form-full"><label>Lý do trả</label><textarea class="form-control" id="f-rreason">${r?.reason||''}</textarea></div>
    </div>`, async () => {
    const body = { order_id:document.getElementById('f-rorder').value, variant_id:document.getElementById('f-rvar').value, quantity:document.getElementById('f-rqty').value, reason:document.getElementById('f-rreason').value, status:document.getElementById('f-rstat').value };
    const res = await apiFetch(r ? `/api/returns/${r.return_id}` : '/api/returns', {method:r?'PUT':'POST', body:JSON.stringify(body)});
    if (res) { toast('Lưu thành công'); closeModal(); renderReturns(); }
  });
}

// ─── INVENTORY ────────────────────────────────────────────────────────────────
async function renderInventory() {
  setActions(`<button class="btn btn-primary" onclick="openInventoryModal()">+ Tạo giao dịch kho</button>`);
  setContent(loading());
  const [rows, variants] = await Promise.all([apiFetch('/api/inventory'), apiFetch('/api/variants')]);
  window._variants = variants||[];
  if (!rows) return;
  setContent(`<div class="card"><div class="card-body">${
    tableWrap(['ID','Sản phẩm','SKU','Số lượng','Loại GD','Ref ID','Ngày tạo'], rows.map(r=>`
      <tr>
        <td class="td-mono">${r.transaction_id}</td>
        <td class="td-main">${r.product_name||'—'}</td>
        <td class="td-mono">${r.sku||'—'}</td>
        <td><span style="color:${r.quantity>0?'var(--success)':'var(--danger)'}">${r.quantity>0?'+':''}${r.quantity}</span></td>
        <td>${statusBadge(r.transaction_type)}</td>
        <td class="td-mono">${r.reference_id||'—'}</td>
        <td>${fmtDate(r.created_at)}</td>
      </tr>`))
  }</div></div>`);
}

function openInventoryModal() {
  const vOpts = (window._variants||[]).map(v=>`<option value="${v.variant_id}">${v.sku} - ${v.product_name}</option>`).join('');
  openModal('Tạo giao dịch kho', `
    <div class="form-grid">
      <div class="form-group form-full"><label>Biến thể sản phẩm</label><select class="form-control" id="f-ivar"><option value="">-- Chọn --</option>${vOpts}</select></div>
      <div class="form-group"><label>Số lượng (âm = xuất)</label><input class="form-control" type="number" id="f-iqty" placeholder="VD: 10 hoặc -5"></div>
      <div class="form-group"><label>Loại giao dịch</label><select class="form-control" id="f-itype"><option value="import">Nhập kho</option><option value="export">Xuất kho</option><option value="return">Trả hàng</option><option value="adjustment">Điều chỉnh</option></select></div>
      <div class="form-group"><label>Reference ID</label><input class="form-control" type="number" id="f-iref" placeholder="ID đơn hàng/nhập..."></div>
    </div>`, async () => {
    const body = { variant_id:document.getElementById('f-ivar').value, quantity:document.getElementById('f-iqty').value, transaction_type:document.getElementById('f-itype').value, reference_id:document.getElementById('f-iref').value||null };
    if (!body.variant_id || !body.quantity) return toast('Chọn sản phẩm và nhập số lượng','error');
    const res = await apiFetch('/api/inventory', {method:'POST', body:JSON.stringify(body)});
    if (res) { toast('Lưu thành công'); closeModal(); renderInventory(); }
  });
}

// ─── AUDIT LOG ────────────────────────────────────────────────────────────────
async function renderAudit() {
  setActions('');
  setContent(loading());
  const rows = await apiFetch('/api/audit');
  if (!rows) return;
  setContent(`<div class="card"><div class="card-body">${
    tableWrap(['ID','Table','Record ID','Action','User','User Type','Ngày tạo'], rows.map(r=>`
      <tr>
        <td class="td-mono">${r.log_id}</td>
        <td class="td-main">${r.table_name||'—'}</td>
        <td class="td-mono">${r.record_id||'—'}</td>
        <td><span class="badge ${r.action==='INSERT'?'badge-success':r.action==='DELETE'?'badge-danger':'badge-info'}">${r.action||'—'}</span></td>
        <td>${r.user_id||'—'}</td>
        <td>${r.user_type||'—'}</td>
        <td>${fmtDate(r.created_at)}</td>
      </tr>`))
  }</div></div>`);
}

// ─── DELETE HELPER ────────────────────────────────────────────────────────────
async function deleteRecord(url, callback) {
  if (!confirm('Bạn có chắc muốn xoá?')) return;
  const res = await apiFetch(url, {method:'DELETE'});
  if (res?.success) { toast('Đã xoá','success'); callback(); }
  else toast('Không thể xoá','error');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadPage('dashboard');
</script>
